[tool.ruff]
line-length = 100
target-version = "py311"

[tool.ruff.lint]
select = ["E", "W", "F", "I", "UP"]
ignore = ["E501"]  # 줄 길이는 formatter에 위임

[tool.ruff.lint.isort]
known-first-party = ["config", "core", "data", "indicators", "agents", "trading", "scheduler", "api", "dashboard"]

[tool.pytest.ini_options]
testpaths = ["tests"]
asyncio_mode = "auto"
python_files = ["test_*.py"]
python_classes = ["Test*"]
python_functions = ["test_*"]
